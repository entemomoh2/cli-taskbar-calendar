# Add these to your Hyprland config and adjust values for your monitor setup.
# This uses windowrule (v1) syntax for broader compatibility.

# Class-based rules (tested on 1440p monitor)
windowrule = float on, match:class ^(taskbar-month-calendar)$
windowrule = size 250 200, move ((monitor_w*1)-254) (47), match:class ^(taskbar-month-calendar)$
windowrule = float on, match:class ^(taskbar-year-calendar)$
windowrule = size 750 800, move ((monitor_w*1)-754) (47), match:class ^(taskbar-year-calendar)$